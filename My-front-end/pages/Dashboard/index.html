<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo Thống kê - Admin LMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; }
        .card { border: none; border-radius: 12px; transition: all 0.3s ease; }
        .stat-card { position: relative; overflow: hidden; color: white; }
        .stat-card i { position: absolute; right: -10px; bottom: -10px; font-size: 5rem; opacity: 0.2; }
        .chart-wrapper { position: relative; height: 320px; }
        .filter-bar { background: #fff; border-radius: 12px; }
        .btn-update { background: linear-gradient(45deg, #4e73df, #224abe); border: none; }
    </style>
</head>
<body>

<div id="sidebar-placeholder"></div>


<div class="container-fluid p-4">
    <div class="card shadow-sm mb-4 filter-bar">
        <div class="card-body d-flex flex-wrap justify-content-between align-items-center gap-3">
            <h5 class="fw-bold m-0 text-dark">
                <i class="bi bi-calendar-range-fill text-primary me-2"></i>Bộ lọc báo cáo
            </h5>
            <div class="d-flex align-items-center gap-2">
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-calendar"></i></span>
                    <input type="date" id="dateFrom" class="form-control border-start-0">
                </div>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-calendar-check"></i></span>
                    <input type="date" id="dateTo" class="form-control border-start-0">
                </div>
                <button onclick="Dashboard.update()" class="btn btn-primary btn-update px-4 shadow-sm fw-bold text-white">
                    <i class="bi bi-arrow-repeat me-1"></i> Cập nhật số liệu
                </button>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card stat-card shadow-sm p-4 bg-primary">
                <h6 class="text-uppercase small fw-bold">Tổng doanh thu</h6>
                <h2 class="fw-bold mb-0" id="txt-revenue">0đ</h2>
                <i class="bi bi-cash-coin"></i>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card shadow-sm p-4 bg-success">
                <h6 class="text-uppercase small fw-bold">Học viên mới</h6>
                <h2 class="fw-bold mb-0" id="txt-users">0</h2>
                <i class="bi bi-people-fill"></i>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card shadow-sm p-4 bg-warning">
                <h6 class="text-uppercase small fw-bold">Khóa học đăng ký</h6>
                <h2 class="fw-bold mb-0" id="txt-orders">0</h2>
                <i class="bi bi-journal-bookmark-fill"></i>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card stat-card shadow-sm p-4 bg-danger">
                <h6 class="text-uppercase small fw-bold">Tỷ lệ hoàn thành</h6>
                <h2 class="fw-bold mb-0" id="txt-percent">0%</h2>
                <i class="bi bi-check-circle-fill"></i>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card shadow-sm p-4 h-100">
                <h6 class="fw-bold mb-4"><i class="bi bi-graph-up me-2 text-primary"></i>Biến động doanh thu</h6>
                <div class="chart-wrapper">
                    <canvas id="lineChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card shadow-sm p-4 h-100">
                <h6 class="fw-bold mb-4"><i class="bi bi-pie-chart-fill me-2 text-success"></i>Tỷ lệ học viên/Lĩnh vực</h6>
                <div class="chart-wrapper">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-12">
            <div class="card shadow-sm p-4">
                <h6 class="fw-bold mb-4"><i class="bi bi-bar-chart-fill me-2 text-info"></i>Top 5 Khóa học bán chạy</h6>
                <div class="chart-wrapper" style="height: 250px;">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="../../assets/js/admin-loader.js"></script>
<script src="../../assets/js/dashboard.js"></script> </body>
</html>

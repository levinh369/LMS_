<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - LMS Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm border-0 p-4">
                    <h2 class="text-center fw-bold mb-4">Đăng ký</h2>
                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" id="fullName" class="form-control" placeholder="Nguyễn Văn A" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button type="button" onclick="Auth.register()" class="btn btn-primary w-100 py-2 fw-bold">Đăng ký</button>
                    </form>
                    <p class="text-center mt-3">Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/auth.js"></script>
</body>
</html>

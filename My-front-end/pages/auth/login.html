<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | LMS Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-color: #4e73df; --social-border: #e0e0e0; }
        body { 
            background: linear-gradient(135deg, #f8f9fc 0%, #e2e8f0 100%); 
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .login-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid var(--social-border);
        }
        .btn-login {
            background: linear-gradient(45deg, #4e73df, #224abe);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(78,115,223,0.4); }
        
        /* Social Buttons */
        .btn-social {
            border: 1px solid var(--social-border);
            border-radius: 10px;
            padding: 10px;
            background: white;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .btn-social:hover { background: #f8f9fa; border-color: #bbb; }
        .divider {
            display: flex; align-items: center; text-align: center; color: #888; margin: 25px 0;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--social-border); }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }
    </style>
</head>
<body>

    <nav class="navbar navbar-light py-4">
        <div class="container justify-content-center">
            <a class="navbar-brand fw-bold fs-3 text-primary" href="index.html">
                <i class="bi bi-mortarboard-fill me-2"></i>LMS Academy
            </a>
        </div>
    </nav>

    <div class="container my-auto">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card login-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold">Đăng nhập</h3>
                        <p class="text-muted small">Học tập không giới hạn cùng chúng tôi</p>
                    </div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" id="loginEmail" class="form-control" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-4">
                            <div class="d-flex justify-content-between">
                                <label class="form-label fw-semibold">Mật khẩu</label>
                                <a href="forgot-password.html" class="small text-decoration-none">Quên mật khẩu?</a>
                            </div>
                            <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                        </div>
                        
                        <button type="button" onclick="Auth.login(this)" class="btn btn-primary btn-login w-100 mb-3 shadow-sm">
                            <span class="spinner-border spinner-border-sm d-none me-2"></span> Đăng nhập
                        </button>

                        <div class="divider small">Hoặc tiếp tục với</div>

                        <div class="row g-2">
                            <div class="col-6">
                                <button type="button" onclick="Auth.loginWithSocial('Google')" class="btn btn-social w-100">
                                    <img src="https://img.icons8.com/color/24/000000/google-logo.png" class="me-2"> Google
                                </button>
                            </div>
                            <div class="col-6">
                                <button type="button" onclick="Auth.loginWithSocial('Facebook')" class="btn btn-social w-100 text-primary">
                                    <i class="bi bi-facebook me-2 fs-5"></i> Facebook
                                </button>
                            </div>
                        </div>

                        <div class="login-error text-danger mt-3 text-center small" style="display:none;"></div>
                    </form>

                    <p class="text-center mt-4 mb-0 small text-muted">
                        Bạn mới đến đây? <a href="register.html" class="fw-bold text-primary text-decoration-none">Tạo tài khoản</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-4 mt-auto">
        <div class="container text-center">
            <p class="text-muted small mb-0">&copy; 2026 LMS Academy. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/common.js"></script>
</body>
</html>

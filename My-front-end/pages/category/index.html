<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

<style>
    body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; color: #4e73df; }
    .card { border-radius: 15px; border: none; transition: box-shadow 0.3s ease; margin-bottom: 1.5rem; }
    
    /* Nút bấm chuyên nghiệp */
    .btn { border-radius: 10px; padding: 10px 18px; font-weight: 600; transition: all 0.3s ease; border: none; }
    
    .btn-filter { background: linear-gradient(45deg, #4e73df, #224abe); color: white; }
    .btn-filter:hover { background: linear-gradient(45deg, #224abe, #1a3a91); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(78, 115, 223, 0.4); color: white; }

    .btn-add { background: linear-gradient(45deg, #1cc88a, #13855c); color: white; }
    .btn-add:hover { background: linear-gradient(45deg, #13855c, #0e6345); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(28, 200, 138, 0.4); color: white; }

    .btn-reset { background-color: #eaecf4; color: #5a5c69; }
    .btn-reset:hover { background-color: #d1d3e2; color: #3a3b45; }

    .form-control, .form-select { 
        border-radius: 10px; padding: 10px 15px; border: 1px solid #d1d3e2; background-color: #fff;
    }
    .form-control:focus { box-shadow: 0 0 0 0.25rem rgba(78, 115, 223, 0.15); border-color: #4e73df; }

    /* Fix table overlapping */
    .table-responsive { border-radius: 0 0 15px 15px; overflow: hidden; }
    .table thead th { 
        background-color: #f8f9fc; color: #4e73df; text-transform: uppercase; 
        font-size: 0.75rem; letter-spacing: 0.1em; padding: 15px; border-bottom: 2px solid #e3e6f0;
    }
    
    /* Trạng thái Switch */
    .form-check-input { cursor: pointer; }
    
    /* Padding cho container tránh dính Header/Footer */
    .main-content { min-height: 80vh; padding-top: 2rem; padding-bottom: 2rem; }
</style>

<div id="sidebar-placeholder"></div>

<div class="container main-content">
    <div class="mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h3 class="fw-bold text-dark m-0">Danh Mục Sản Phẩm</h3>
            <p class="text-muted small mb-0">Quản lý và tìm kiếm danh sách các danh mục hệ thống</p>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <div class="row g-3">
                <div class="col-lg-3 col-md-6">
                    <label class="form-label fw-semibold text-muted small">Từ khóa</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" id="keySearch" class="form-control border-start-0" placeholder="Tên danh mục...">
                    </div>
                </div>

                <div class="col-lg-2 col-md-3 col-6">
                    <label class="form-label fw-semibold text-muted small">Từ ngày</label>
                    <input type="date" id="fromDate" class="form-control">
                </div>
                <div class="col-lg-2 col-md-3 col-6">
                    <label class="form-label fw-semibold text-muted small">Đến ngày</label>
                    <input type="date" id="toDate" class="form-control">
                </div>

                <div class="col-lg-2 col-md-6">
                    <label class="form-label fw-semibold text-muted small">Trạng thái</label>
                    <select id="isActive" class="form-select">
                        <option value="-1">Tất cả</option>
                        <option value="1">Hoạt động</option>
                        <option value="0">Khóa</option>
                    </select>
                </div>

                <div class="col-lg-3 col-md-6 d-flex align-items-end gap-2">
                    <button onclick="Category.loadData(1)" class="btn btn-filter flex-grow-1" title="Lọc dữ liệu">
                        <i class="bi bi-funnel"></i> Lọc
                    </button>
                    <button onclick="Category.resetSearch()" class="btn btn-reset" title="Làm mới">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                    <button onclick="Category.openCreateModal()" class="btn btn-add flex-grow-1">
                        <i class="bi bi-plus-lg"></i> Thêm
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">Tên danh mục</th>
                            <th>Ngày tạo</th>
                            <th>Mô tả</th>
                            <th class="text-center">Trạng thái</th>
                            <th class="text-center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="category-table-body">
                        </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer bg-white border-0 p-3">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
                    <span class="text-muted">Tổng số bản ghi: </span><strong id="total-records" class="text-primary">0</strong>
                </div>
                <div class="col-md-6">
                    <nav id="pagination" class="d-flex justify-content-center justify-content-md-end">
                        <ul id="paging-ul" class="pagination pagination-sm m-0"></ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="categoryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <form id="frmCategory" class="modal-content shadow-lg border-0" style="border-radius: 15px;">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Thêm Danh Mục</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Tên danh mục <span class="text-danger">*</span></label>
                    <input type="text" id="txtName" name="name" class="form-control" placeholder="Nhập tên..." required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Mô tả</label>
                    <textarea id="txtDescription" name="description" class="form-control" rows="3" placeholder="Nhập mô tả..."></textarea>
                </div>
                <div class="mb-0">
                    <label class="form-label fw-bold d-block">Trạng thái</label>
                    <div class="form-check form-switch custom-switch"> 
                        <input class="form-check-input" type="checkbox" id="txtIsActive" name="isActive" checked style="width: 45px; height: 22px;">
                        <label class="form-check-label ms-2 fw-semibold text-success" for="txtIsActive" id="lblStatus">Đang Hoạt động</label>
                    </div>
                </div>
            </div>
            <div class="modal-footer border-0 p-4 pt-0">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Đóng</button>
                <button type="button" onclick="Category.create()" class="btn btn-primary px-4">Lưu vào API</button>
            </div>
        </form>
    </div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg border-0" style="border-radius: 15px;">
            <div class="modal-header bg-info text-white" style="border-radius: 15px 15px 0 0;">
                <h5 class="modal-title fw-bold"><i class="bi bi-info-circle me-2"></i>Chi Tiết Danh Mục</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <table class="table table-borderless mb-0">
                    <tr>
                        <th class="text-muted" style="width: 40%;">ID hệ thống:</th>
                        <td id="dtlId" class="fw-bold"></td>
                    </tr>
                    <tr>
                        <th class="text-muted">Tên danh mục:</th>
                        <td id="dtlName" class="text-primary fw-bold"></td>
                    </tr>
                    <tr>
                        <th class="text-muted">Mô tả:</th>
                        <td id="dtlDescription"></td>
                    </tr>
                    <tr>
                        <th class="text-muted">Ngày tạo:</th>
                        <td id="dtlCreatedAt"></td>
                    </tr>
                    <tr>
                        <th class="text-muted">Trạng thái:</th>
                        <td id="dtlStatus"></td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editCategoryModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <form id="frmEditCategory" class="modal-content shadow-lg border-0" style="border-radius: 15px;">
            <div class="modal-header bg-warning text-dark" style="border-radius: 15px 15px 0 0;">
                <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square me-2"></i>Chỉnh Sửa Danh Mục</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <input type="hidden" id="editId" name="id">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Tên danh mục <span class="text-danger">*</span></label>
                    <input type="text" id="editName" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Mô tả</label>
                    <textarea id="editDescription" name="description" class="form-control" rows="3"></textarea>
                </div>
                <div class="mb-0">
                    <label class="form-label fw-bold d-block">Trạng thái</label>
                    <div class="form-check form-switch"> 
                        <input class="form-check-input" type="checkbox" id="editIsActive" name="isActive" style="width: 45px; height: 22px;">
                        <label class="form-check-label ms-2 fw-semibold" for="editIsActive" id="lblEditStatus">Hoạt động</label>
                    </div>
                </div>
            </div>
            <div class="modal-footer border-0 p-4 pt-0">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Hủy</button>
                <button type="submit" class="btn btn-primary px-4 shadow-sm" style="background: linear-gradient(45deg, #4e73df, #224abe);">Cập nhật</button>
            </div>
        </form>
    </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/twbs-pagination/1.4.2/jquery.twbsPagination.min.js"></script>

<script src="../assets/js/category.js"></script>
<script src="../assets/js/admin-loader.js"></script>
<script src="../assets/js/common.js"></script>

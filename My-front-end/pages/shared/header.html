<style>

    /* Container của thanh progress */
.custom-progress {
    position: relative;
    overflow: visible; /* Để số không bị cắt mất */
    cursor: pointer;
}

/* Tạo hiệu ứng hiện con số khi hover */
.custom-progress:hover::after {
    content: attr(title); /* Lấy nội dung từ thuộc tính title */
    position: absolute;
    top: -25px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: #fff;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    white-space: nowrap;
    z-index: 10;
}

/* Mũi tên nhỏ bên dưới con số */
.custom-progress:hover::before {
    content: "";
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 5px;
    border-style: solid;
    border-color: #333 transparent transparent transparent;
}

/* Hiệu ứng làm sáng thanh bar khi hover */
.custom-progress:hover .progress-bar {
    filter: brightness(1.2);
    transition: 0.3s;
}

.dropdown-menu {
        overflow: visible !important; /* Quan trọng: Để badge không bị cắt */
    }

    /* 2. ITEM THÔNG BÁO */
    .unread-item {
        display: flex !important;
        align-items: center !important; /* Căn giữa theo chiều dọc */
        padding: 12px 15px !important;
        background-color: #f0f7ff !important;
        border-bottom: 1px solid #edf2f7 !important;
        text-decoration: none !important;
        transition: all 0.2s ease;
    }

    .unread-item:hover {
        background-color: #e2eefe !important;
    }

    /* 3. WRAPPER AVATAR */
    .notif-avatar-wrapper {
        position: relative !important;
        width: 48px !important;
        height: 48px !important;
        flex-shrink: 0 !important; /* Không cho ảnh bị bóp nhỏ */
        margin-right: 12px !important;
    }

    .notif-avatar-wrapper img {
        width: 100% !important;
        height: 100% !important;
        border-radius: 50% !important;
        object-fit: cover !important;
        display: block !important;
    }

    /* 4. BADGE ICON (LIKE, LOVE, ...) */
    .reaction-badge-overlay {
        position: absolute !important;
        bottom: -4px !important;
        right: -4px !important;
        width: 24px !important;
        height: 24px !important;
        background: white !important;
        border-radius: 50% !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        font-size: 14px !important;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2) !important;
        border: 2px solid #fff !important;
        z-index: 10 !important;
        line-height: 1 !important;
    }

    /* 5. PHẦN NỘI DUNG TEXT */
    .notif-body {
        flex: 1 !important;
        min-width: 0 !important; /* Chống vỡ layout khi text quá dài */
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
    }

    .notif-message {
        color: #1a202c !important;
        font-size: 14px !important;
        line-height: 1.4 !important;
        margin: 0 !important;
        word-wrap: break-word !important;
    }

    .notif-time {
        color: #0866ff !important;
        font-size: 11px !important;
        font-weight: 600 !important;
        margin-top: 3px !important;
    }

    /* 6. CHẤM XANH CHƯA ĐỌC */
    .notif-unread-dot {
        width: 10px !important;
        height: 10px !important;
        background-color: #0866ff !important;
        border-radius: 50% !important;
        margin-left: 10px !important;
        flex-shrink: 0 !important;
    }

</style>

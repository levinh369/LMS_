<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
<script src="../assets/js/notification.js"></script>
<script>
$(document).ready(function() {
    // 1. Kiểm tra xem Token của Admin có tồn tại không
    const token = localStorage.getItem("jwt_token");
    
    // 2. Kiểm tra xem đối tượng NotificationApp đã nạp chưa
    if (token && typeof NotificationApp !== 'undefined') {
        console.log("🚩 Admin System: Khởi tạo hệ thống thông báo...");
        
        // Chạy ngay lệnh lấy số lượng tin chưa đọc để hiện Badge đỏ
        NotificationApp.getUnreadCount(); 
        
        // Mở kết nối SignalR để nhận tin "Ting Ting" real-time
        NotificationApp.init(); 
    } else {
        console.warn("⚠️ Admin System: Không tìm thấy Token hoặc NotificationApp.");
    }

    // 3. Bắt sự kiện click chuông thông báo (Vì Admin không dùng common.js)
    $(document).on('click', '#notifDropdown', function() {
        // Chỉ load dữ liệu khi dropdown mở ra
        const isOpening = $(this).attr('aria-expanded') === 'false' || !$(this).attr('aria-expanded');
        if (isOpening) {
            NotificationApp.fetchNotifications(false);
        }
    });

    // 4. Bắt sự kiện nút "Xem thêm" cho Admin
    $(document).on('click', '#btnLoadMore button', function(e) {
        e.preventDefault();
        e.stopPropagation();
        NotificationApp.fetchNotifications(true);
    });
});
</script>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Người Dùng | LMS System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; }
        .card { border-radius: 15px; border: none; }
        .btn { border-radius: 10px; padding: 10px 18px; font-weight: 600; transition: all 0.3s ease; border: none; }
        
        .btn-filter { background: linear-gradient(45deg, #4e73df, #224abe); color: white; }
        .btn-filter:hover { background: linear-gradient(45deg, #224abe, #1a3a91); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(78, 115, 223, 0.4); color: white; }

        .btn-add { background: linear-gradient(45deg, #1cc88a, #13855c); color: white; }
        .btn-add:hover { background: linear-gradient(45deg, #13855c, #0e6345); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(28, 200, 138, 0.4); color: white; }

        .btn-reset { background-color: #eaecf4; color: #5a5c69; }
        .btn-reset:hover { background-color: #d1d3e2; color: #3a3b45; }

        .form-control, .form-select { border-radius: 10px; padding: 10px 15px; border: 1px solid #d1d3e2; background-color: #f8f9fc; }
        .table thead th { background-color: #f8f9fc; color: #4e73df; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.1em; padding: 15px; }
        .user-avatar { width: 40px; height: 40px; object-fit: cover; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="sidebar-placeholder"></div>

<div class="container py-5">
    <div class="mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h3 class="fw-bold text-dark m-0">Quản Lý Người Dùng</h3>
            <p class="text-muted small">Quản lý học viên, giảng viên và phân quyền hệ thống</p>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-4">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label fw-semibold text-muted small">Từ khóa (Tên/Email)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person-search text-muted"></i></span>
                        <input type="text" id="keySearch" class="form-control bg-light border-start-0" placeholder="Tìm người dùng...">
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-semibold text-muted small">Vai trò</label>
                    <select id="roleId" class="form-select bg-light">
                        <option value="-1">Tất cả</option>
                        <option value="1">Quản trị viên</option>
                        <option value="2">Học viên</option>
                        <option value="3">Giảng viên</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label fw-semibold text-muted small">Trạng thái</label>
                    <select id="isActive" class="form-select bg-light">
                        <option value="-1">Tất cả</option>
                        <option value="1">Đang hoạt động</option>
                        <option value="0">Bị khóa</option>
                    </select>
                </div>
                <div class="col-md-5 d-flex align-items-end gap-2">
                    <button onclick="Manager.loadData(1)" class="btn btn-filter flex-grow-1 shadow-sm"><i class="bi bi-funnel"></i> Lọc</button>
                    <button onclick="Manager.resetSearch()" class="btn btn-reset shadow-sm"><i class="bi bi-arrow-clockwise"></i></button>
                    <button onclick="Manager.openCreateModal()" class="btn btn-add flex-grow-1 shadow-sm"><i class="bi bi-person-plus"></i> Thêm User</button>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Người dùng</th>
                            <th>Email</th>
                            <th>Vai trò</th>
                            <th class="text-center">Ngày tạo</th>
                            <th class="text-center">Trạng thái</th>
                            <th class="text-center">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body"></tbody>
                </table>
            </div>
            <div class="d-flex justify-content-between align-items-center p-4 border-top">
                <div class="small text-muted">Tổng số: <strong id="total-records">0</strong></div>
                <div id="pagination"><ul id="paging-ul" class="pagination pagination-sm m-0"></ul></div>
            </div>
        </div>
    </div>
</div>


<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <form id="frmUser">
            <div class="modal-content shadow-lg border-0" style="border-radius: 15px;">
                <div class="modal-header border-bottom-0 pt-4 px-4">
                    <h5 class="modal-title fw-bold" id="modalTitle">Thông tin người dùng</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <input type="hidden" id="userId" name="id">

                    <div class="text-center mb-4">
                        <img id="userAvatarPreview" src="/assets/img/default-avatar.png" 
                             class="rounded-circle border shadow-sm" 
                             style="width: 100px; height: 100px; object-fit: cover;">
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Họ và tên <span class="text-danger">*</span></label>
                            <input type="text" id="fullName" name="fullName" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                            <input type="email" id="emailInput" name="emailInput" class="form-control" required readonly>
                        </div>

                        <div id="passArea" class="col-md-6">
                            <label class="form-label fw-semibold">Mật khẩu <span class="text-danger">*</span></label>
                            <input type="password" id="passwordInput" name="password" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Vai trò</label>
                            <select id="modalRoleId" name="roleId" class="form-select">
                                <option value="1">Quản trị viên</option>
                                <option value="2">Học viên</option>
                                <option value="3">Giảng viên</option>
                            </select>
                        </div>

                        <div class="col-md-12 mt-4">
                            <label class="form-label fw-bold d-block">Trạng thái tài khoản</label>
                            <div class="form-check form-switch p-0 ms-5">
                                <input class="form-check-input" type="checkbox" id="modalIsActive" checked style="width: 45px; height: 22px;">
                                <label class="form-check-label ms-3 fw-semibold text-success" id="statusLabel">Đang hoạt động</label>
                            </div>
                            
                            <div id="createdAtContainer">
                                <small class="text-muted d-block mt-2">Ngày tạo: <span id="createdAtLabel">--/--/----</span></small>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-top-0 p-4 pt-0">
                    <button type="button" class="btn btn-light fw-bold" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" id="btnSave" onclick="Manager.save()" class="btn btn-primary fw-bold px-4 shadow-sm">
                        Lưu dữ liệu
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
<div id="footer-placeholder"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/twbs-pagination/1.4.2/jquery.twbsPagination.min.js"></script>
<script src="../../assets/js/common.js"></script>
<script src="../../assets/js/managerUser.js"></script>
<script src="../../assets/js/admin-loader.js"></script>
</body>
</html>

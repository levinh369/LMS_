<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Lộ trình</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --f8-orange: #f05123; }
        body { background-color: #fff; font-family: 'Inter', sans-serif; }
        
        /* Banner lộ trình */
        .roadmap-header { padding: 60px 0; background: #fff; }
        .roadmap-title { font-size: 2.5rem; font-weight: 900; }
        
        /* Giao diện chặng đường */
        .phase-container { margin-bottom: 50px; position: relative; }
        .phase-header { margin-bottom: 25px; }
        .phase-name { 
            font-size: 1.5rem; font-weight: 800; color: #292929;
            display: inline-block; position: relative;
        }

        /* Card khóa học con */
        .course-card {
            border: 2px solid #f0f0f0; border-radius: 16px;
            padding: 20px; margin-bottom: 15px; display: flex;
            align-items: center; transition: all 0.3s;
            text-decoration: none; color: inherit;
        }
        .course-card:hover { border-color: var(--f8-orange); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        
        .course-img { width: 120px; height: 70px; object-fit: cover; border-radius: 10px; margin-right: 20px; }
        .course-info h4 { font-size: 1.1rem; font-weight: 700; margin-bottom: 5px; }
        .btn-learn { 
            background-color: var(--f8-orange); color: white; border-radius: 50px;
            padding: 8px 20px; font-weight: 600; font-size: 0.9rem; border: none;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="roadmap-header text-center" id="roadmapHeader">
        <h1 class="roadmap-title" id="txtTitle">Đang tải...</h1>
        <p class="text-muted mx-auto" id="txtDescription" style="max-width: 700px;"></p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-9" id="roadmapContent">
            </div>
    </div>
</div>



<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
const RoadmapDetail = {
    init: function() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (id) this.loadData(id);
    },

    loadData: async function(id) {
        try {
            // Gọi API lấy chi tiết lộ trình
            const response = await fetch(`https://lms-u2jn.onrender.com/api/roadmap/${id}/detail`);
            const res = await response.json();
            const data = res.data;

            $('#txtTitle').text(data.title);
            $('#txtDescription').text(data.description);

            this.renderRoadmap(data.courses);
        } catch (e) {
            console.error("Lỗi load dữ liệu học viên");
        }
    },

    // Logic quan trọng: Group khóa học theo PhaseName
    renderRoadmap: function(courses) {
        if (!courses || courses.length === 0) return;

        // 1. Group dữ liệu bằng JS
        const grouped = courses.reduce((acc, obj) => {
            const key = obj.phaseName || "Bắt đầu";
            if (!acc[key]) acc[key] = [];
            acc[key].push(obj);
            return acc;
        }, {});

        let html = '';
        let globalIndex = 1;

        // 2. Lặp qua từng Giai đoạn (Phase)
        for (const phaseName in grouped) {
            html += `
            <div class="phase-container">
                <div class="phase-header">
                    <h2 class="phase-name">${phaseName}</h2>
                </div>
                <div class="phase-body">
                    ${grouped[phaseName].map(course => `
                        <a href="/course-detail.html?id=${course.id}" class="course-card">
                            <img src="${course.thumbnailUrl || 'https://via.placeholder.com/120x70'}" class="course-img">
                            <div class="course-info flex-grow-1">
                                <h4>${globalIndex++}. ${course.title}</h4>
                                <p class="text-muted small mb-0">Miễn phí</p>
                            </div>
                            <button class="btn-learn">Xem khóa học</button>
                        </a>
                    `).join('')}
                </div>
            </div>`;
        }

        $('#roadmapContent').html(html);
    }
};

$(document).ready(() => RoadmapDetail.init());
</script>
</body>
</html>

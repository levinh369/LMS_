<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cài đặt tài khoản | LMS Academy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --f8-orange: #f05123; --f8-bg: #f8f9fa; }
        body { background-color: var(--f8-bg); font-family: 'Be Vietnam Pro', sans-serif; color: #292e39; }
        .settings-card { background: #fff; border-radius: 20px; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); margin-top: 30px; }
        .avatar-edit-wrapper { position: relative; display: inline-block; cursor: pointer; transition: 0.3s; }
        .preview-avatar-lg { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; border: 5px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .camera-icon { position: absolute; bottom: 10px; right: 10px; background: #333; color: #fff; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid #fff; }
        .form-label { font-weight: 700; font-size: 14px; margin-bottom: 8px; color: #444; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #dee2e6; }
        .section-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .btn-save { background: var(--f8-orange); color: white; border: none; padding: 12px 40px; border-radius: 12px; font-weight: 700; transition: 0.3s; }
        .btn-save:hover { background: #d4431b; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="settings-card">
                    <form id="editProfileForm">
                        <div class="row g-5">
                            <div class="col-md-4 text-center border-end">
                                <div class="avatar-edit-wrapper" onclick="$('#input-avatar-file').click()">
                                    <img id="avatar-preview" src="../assets/img/default-avatar.png" class="preview-avatar-lg">
                                    <div class="camera-icon"><i class="bi bi-camera-fill"></i></div>
                                </div>
                                <input type="file" id="input-avatar-file" accept="image/*" class="d-none">
                                <h5 class="mt-3 fw-bold mb-1" id="display-name">Học viên LMS</h5>
                            </div>

                            <div class="col-md-8">
                                <div class="section-title"><i class="bi bi-person-gear text-primary"></i> Thông tin cá nhân</div>
                                <div class="mb-4">
                                    <label class="form-label">Họ và tên</label>
                                    <input type="text" id="input-fullname" class="form-control" placeholder="Nhập họ tên...">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label">Email đăng ký</label>
                                    <input type="email" id="input-email" class="form-control bg-light" readonly>
                                </div>

                                <hr class="my-5">

                                <div class="section-title">
                                    <i class="bi bi-shield-lock text-danger"></i> 
                                    <span id="pass-section-title">Bảo mật & Mật khẩu</span>
                                </div>
                                
                                <p id="fb-user-note" class="text-muted small mb-4" style="display:none;">
                                    Bác đang dùng Facebook. Hãy thiết lập mật khẩu để có thể đăng nhập trực tiếp nhé!
                                </p>

                                <div class="mb-3" id="curr-pass-group">
                                    <label class="form-label">Mật khẩu hiện tại</label>
                                    <input type="password" id="input-current-password" class="form-control" placeholder="Nhập mật khẩu cũ">
                                </div>
                                
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Mật khẩu mới</label>
                                        <input type="password" id="input-new-password" class="form-control" placeholder="Tối thiểu 6 ký tự">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Xác nhận mật khẩu mới</label>
                                        <input type="password" id="input-confirm-password" class="form-control" placeholder="Nhập lại mật khẩu mới">
                                    </div>
                                </div>

                                <div class="text-end mt-5 pt-3 border-top">
                                    <button type="button" class="btn btn-light rounded-pill px-4 me-2 fw-bold" onclick="history.back()">Hủy bỏ</button>
                                    <button type="submit" class="btn btn-save shadow-sm">Lưu thay đổi</button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/user.js"></script>
</body>
</html>

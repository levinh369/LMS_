<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khóa học của tôi - LMS PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --f8-blue: #0866ff; --f8-orange: #ff511c; }
        body { background-color: #f0f2f5; font-family: -apple-system, system-ui, sans-serif; }
        .course-container { max-width: 1100px; margin: 40px auto; min-height: 500px; }
        
        .course-card {
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            border: none;
            transition: all 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .course-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
        
        .course-img-wrapper { position: relative; padding-top: 56.25%; }
        .course-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        .progress { height: 6px; border-radius: 10px; background-color: #eee; }
        .progress-bar { background-color: #28a745; }
        
        .btn-start {
            background-color: var(--f8-blue);
            color: white;
            border-radius: 50px;
            font-weight: 600;
            padding: 8px 20px;
            text-decoration: none;
            display: block;
            width: 100%;
            text-align: center;
            transition: 0.2s;
        }
        .btn-start:hover { background-color: #0652d1; color: white; }
        
        .last-lesson { font-size: 0.8rem; color: #65676b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="container course-container">
        <div class="mb-4">
            <h3 class="fw-bold">Khóa học của tôi</h3>
            <p class="text-muted">Tiếp tục hành trình chinh phục kiến thức của bạn.</p>
        </div>

        <div class="row g-4" id="myCoursesList">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Đang lấy danh sách khóa học...</p>
            </div>
        </div>

        <div id="emptyCourse" class="text-center py-5 d-none">
            <img src="https://cdn-icons-png.flaticon.com/512/4076/4076549.png" width="100" class="mb-3 opacity-25">
            <h5 class="text-muted">Bạn chưa đăng ký khóa học nào</h5>
            <a href="/pages/courses/index.html" class="btn btn-primary rounded-pill px-4 mt-2 shadow-sm">Tìm khóa học ngay</a>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="../../assets/js/common.js"></script>
    <script src="../../assets/js/myCourse.js"></script>

</body>
</html>

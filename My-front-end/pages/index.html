<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS PRO - Nền tảng học lập trình số 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
       /* 1. Nâng cấp thanh lọc Danh mục */
#categoryContainer {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    overflow-x: auto;
    scrollbar-width: none; /* Ẩn scrollbar cho Firefox */
}
#categoryContainer::-webkit-scrollbar { display: none; } /* Ẩn scrollbar cho Chrome/Safari */

.filter-pill {
    padding: 8px 24px;
    border-radius: 50px;
    border: 2px solid #eee;
    background: #fff;
    color: #555;
    font-weight: 600;
    font-size: 0.9rem;
    white-space: nowrap;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
}

.filter-pill:hover {
    border-color: #0d6efd;
    color: #0d6efd;
    transform: translateY(-2px);
    background: rgba(13, 110, 253, 0.05);
}

.filter-pill.active {
    background: #0d6efd;
    color: #fff;
    border-color: #0d6efd;
    box-shadow: 0 4px 15px rgba(13, 110, 253, 0.3);
}

/* 2. Nâng cấp Card Khóa học */
.course-card {
    border: none;
    border-radius: 16px;
    overflow: hidden;
    background: #fff;
    transition: all 0.4s ease;
    border: 1px solid rgba(0,0,0,0.05);
}

.course-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 22px 40px rgba(0,0,0,0.08) !important;
}

.course-img-wrapper {
    position: relative;
    padding-top: 56.25%; /* Tỉ lệ 16:9 */
    overflow: hidden;
}

.course-img {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
}

.course-card:hover .course-img {
    transform: scale(1.1);
}

/* Badge cao cấp */
.badge-category {
    position: absolute;
    top: 12px; left: 12px;
    z-index: 2;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    backdrop-filter: blur(4px);
}

.badge-pro { background: rgba(255, 152, 0, 0.9); color: #fff; }
.badge-free { background: rgba(46, 204, 113, 0.9); color: #fff; }

/* Thông tin giảng viên */
.instructor-img {
    width: 32px; height: 32px;
    border-radius: 10px;
    object-fit: cover;
}

.price-pro { color: #2d3436; font-weight: 800; font-size: 1.2rem; }
.price-free { color: #2ecc71; font-weight: 800; font-size: 1.2rem; }

.section-title {
    font-weight: 800;
    font-size: 1.75rem;
    letter-spacing: -0.5px;
    margin-bottom: 30px;
}
.search-result-popup {
    transition: all 0.2s ease-in-out;
}

.search-item {
    display: flex;
    align-items: center;
    padding: 10px 15px;
    text-decoration: none;
    color: #333;
    transition: background 0.2s;
}

.search-item:hover {
    background-color: #f8f9fa;
}

.search-item img {
    width: 40px;
    height: 40px;
    object-fit: cover;
    border-radius: 6px;
    margin-right: 12px;
}

.search-item .title {
    font-size: 0.9rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
/* 3. Style Roadmap - Đã tối ưu */
.roadmap-card {
    background: #fff;
    border-radius: 20px;
    padding: 25px;
    border: 1px solid rgba(0,0,0,0.06);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    text-decoration: none !important;
    display: flex;
    flex-direction: column;
    height: 100%; /* Đảm bảo các card cao bằng nhau */
}

.roadmap-card:hover {
    transform: translateY(-8px);
    border-color: #0d6efd;
    box-shadow: 0 15px 35px rgba(13, 110, 253, 0.1) !important;
}

/* Icon fix cứng màu sắc và kích thước */
.roadmap-icon {
    width: 50px;
    height: 50px;
    background: rgba(13, 110, 253, 0.1);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 15px;
    color: #0d6efd;
    font-size: 1.5rem;
}

.roadmap-card .step-count {
    font-size: 0.7rem;
    font-weight: 800;
    color: #0d6efd;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    display: block;
}

.roadmap-card h4 {
    font-weight: 700;
    font-size: 1.15rem;
    color: #2d3436;
    margin-bottom: 10px;
}

.roadmap-desc {
    /* 1. Phải là khối box đặc biệt này */
    display: -webkit-box !important;
    -webkit-box-orient: vertical !important;
    
    /* 2. Cắt đúng 2 dòng */
    -webkit-line-clamp: 2 !important;
    line-clamp: 2 !important;
    
    /* 3. Giấu phần thừa */
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    
    /* 4. Định hình chiều cao (tránh bị nhảy khung) */
    line-height: 1.5 !important;
    max-height: 3em !important; /* 1.5 x 2 dòng = 3em */
    
    /* 5. Quan trọng: Đảm bảo nó là block */
    width: 100%;
    margin-top: 5px;
}
    </style>
</head>
<body>
<div id="header-placeholder"></div>


<header class="hero-section text-center">
    <div class="container">
        <h1 class="display-5 fw-bold mb-3">Học Lập Trình Thực Chiến</h1>
        <p class="lead opacity-75">Kỹ năng mới, tương lai mới. Bắt đầu ngay hôm nay.</p>
    </div>
</header>

<main class="container">
    <div id="categoryContainer">
        <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
    </div>
   <section class="mb-5">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h3 class="section-title mb-0">
            <i class="bi bi-map-fill text-primary me-2"></i>Lộ trình học bài bản
        </h3>
        <a href="/road_map/roadmaps.html" class="text-decoration-none fw-bold small">
    Tất cả lộ trình <i class="bi bi-arrow-right"></i>
</a>
    </div>

    <div class="row g-4" id="roadmapList">
        <div class="text-center py-5">
            <div class="spinner-border text-primary"></div>
        </div>
    </div>
</section>
    <hr class="my-5">

    <section class="mb-5">
        <h3 class="section-title"><i class="bi bi-crown-fill text-warning me-2"></i>Khóa học Premium</h3>
        <div class="row g-4" id="proCourseList"></div>
    </section>

    <section class="mb-5">
        <h3 class="section-title"><i class="bi bi-gift-fill text-success me-2"></i>Khóa học Miễn Phí</h3>
        <div class="row g-4" id="freeCourseList"></div>
    </section>
</main>

<div id="footer-placeholder"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="assets/js/notification.js"></script>
<script src="assets/js/common.js"></script>
<script src="assets/js/Home.js"></script>


</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Bài Học - Grid Edit Full</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; }
        .drag-handle { cursor: move; color: #adb5bd; }
        .drag-handle:hover { color: #0d6efd; }
        
        /* Table Grid trong Modal */
        .modal-xl { max-width: 90%; }
        .table-bulk input { border: 1px solid transparent !important; background-color: #f1f3f5; }
        .table-bulk input:focus { border-color: #0d6efd !important; background-color: #fff; box-shadow: none; }
        .sticky-thead th { position: sticky; top: 0; background: #fff; z-index: 10; border-bottom: 2px solid #dee2e6 !important; }
        
        /* Animation */
        .row-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container-fluid py-4 px-lg-5">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
            <div>
                <h5 class="fw-bold text-primary mb-0"><i class="bi bi-collection-play-fill me-2"></i>QUẢN LÝ BÀI HỌC</h5>
                <small class="text-muted">Chương: <b>Giới thiệu về ASP.NET Core</b> (ID: <span id="displayChapterId">101</span>)</small>
            </div>
            <button class="btn btn-primary shadow-sm" onclick="LessonManager.openBulkModal()">
                <i class="bi bi-plus-circle-fill me-1"></i> Thêm bài học hàng loạt
            </button>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="mainLessonTable">
                    <thead class="table-light">
                        <tr class="text-center">
                            <th style="width: 50px">#</th>
                            <th class="text-start">Tiêu đề bài học</th>
                            <th>Video Link</th>
                            <th style="width: 100px">Học thử</th>
                            <th style="width: 120px">Trạng thái</th>
                            <th style="width: 80px">Xóa</th>
                        </tr>
                    </thead>
                    <tbody id="mainLessonBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="bulkModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
            <div class="modal-header border-0 bg-light py-3">
                <h5 class="modal-title fw-bold text-primary">
                    <i class="bi bi-layers-half me-2"></i>Cấu hình bài học mới
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="table-responsive" style="max-height: 450px;">
                    <table class="table table-borderless align-middle table-bulk" id="tblBulkInput">
                        <thead class="sticky-thead">
                            <tr class="small text-muted text-uppercase text-center">
                                <th style="width: 35%" class="text-start ps-3">Tiêu đề bài học <span class="text-danger">*</span></th>
                                <th style="width: 40%">Link YouTube / Video ID</th>
                                <th style="width: 10%">Thứ tự</th>
                                <th style="width: 80px;">Học thử</th>
                                <th style="width: 50px;"></th>
                            </tr>
                        </thead>
                        <tbody id="bulkInputBody">
                            </tbody>
                    </table>
                </div>

                <div class="mt-3">
                    <button type="button" onclick="LessonManager.addInputRow()" class="btn btn-outline-primary rounded-pill fw-bold btn-sm px-3">
                        <i class="bi bi-plus-circle me-1"></i> Thêm dòng mới
                    </button>
                </div>
            </div>
            <div class="modal-footer border-0 p-4 pt-0">
                <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Đóng</button>
                <button type="button" class="btn btn-success rounded-pill px-5 fw-bold shadow" onclick="LessonManager.submitBulk()">
                    <i class="bi bi-cloud-arrow-up me-1"></i> Lưu tất cả bài học
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

<script>
// GIẢ LẬP DỮ LIỆU TỪ DATABASE
let currentChapterId = 101;
let lessonsInDb = [
    { id: 1, title: "Giới thiệu ASP.NET Core", videoUrl: "youtube.com/v1", orderIndex: 1, isFree: true, isActive: true },
    { id: 2, title: "Cài đặt SDK và Visual Studio", videoUrl: "youtube.com/v2", orderIndex: 2, isFree: false, isActive: true }
];

const LessonManager = {
    init: function() {
        this.renderMainTable();
        this.initSortable();
    },

    // 1. VẼ BẢNG CHÍNH (DANH SÁCH BÀI HỌC HIỆN TẠI)
    renderMainTable: function() {
        let html = '';
        lessonsInDb.sort((a,b) => a.orderIndex - b.orderIndex).forEach((item, index) => {
            html += `
            <tr data-id="${item.id}">
                <td class="text-center"><i class="bi bi-grip-vertical drag-handle"></i></td>
                <td class="fw-bold text-dark">${item.title}</td>
                <td><small class="text-muted">${item.videoUrl || '<i>Chưa có link</i>'}</small></td>
                <td class="text-center">${item.isFree ? '<span class="badge bg-success-subtle text-success">Free</span>' : '<span class="badge bg-light text-muted">Pro</span>'}</td>
                <td class="text-center">
                    <span class="badge rounded-pill ${item.isActive ? 'bg-success' : 'bg-secondary'}">${item.isActive ? 'Hiện' : 'Ẩn'}</span>
                </td>
                <td class="text-center">
                    <button class="btn btn-link text-danger p-0" onclick="LessonManager.delete(${item.id})"><i class="bi bi-trash"></i></button>
                </td>
            </tr>`;
        });
        $('#mainLessonBody').html(html || '<tr><td colspan="6" class="text-center py-4">Chương này chưa có bài học. Hãy thêm mới!</td></tr>');
    },

    // 2. MỞ MODAL THÊM HÀNG LOẠT
    openBulkModal: function() {
        $('#bulkInputBody').empty();
        this.addInputRow(); // Tạo 1 dòng trống mặc định
        $('#bulkModal').modal('show');
    },

    // 3. THÊM DÒNG MỚI TRONG MODAL (GRID-EDIT)
    addInputRow: function() {
        const tbody = $('#bulkInputBody');
        // Thứ tự tự động = Số bài trong DB + Số dòng trong Modal + 1
        const nextOrder = lessonsInDb.length + tbody.find('tr').length + 1;

        const rowHtml = `
            <tr class="row-fade-in border-bottom">
                <td>
                    <input type="text" class="form-control rounded-3 l-title" placeholder="Tiêu đề bài học..." required>
                </td>
                <td>
                    <input type="text" class="form-control rounded-3 l-video" placeholder="Dán link hoặc Video ID">
                </td>
                <td>
                    <input type="number" class="form-control rounded-3 l-order text-center fw-bold" value="${nextOrder}">
                </td>
                <td class="text-center">
                    <div class="form-check form-switch d-inline-block">
                        <input class="form-check-input l-isFree" type="checkbox" style="width: 40px; height: 20px;">
                    </div>
                </td>
                <td class="text-center">
                    <button class="btn btn-link text-danger p-0" onclick="$(this).closest('tr').remove()"><i class="bi bi-x-circle-fill"></i></button>
                </td>
            </tr>`;
        tbody.append(rowHtml);
    },

    // 4. GOM DỮ LIỆU GỬI VỀ WEB API
    submitBulk: function() {
        const newLessons = [];
        let isValid = true;

        $('#bulkInputBody tr').each(function() {
            const row = $(this);
            const title = row.find('.l-title').val().trim();
            
            if(!title) {
                isValid = false;
                row.find('.l-title').addClass('is-invalid');
            } else {
                row.find('.l-title').removeClass('is-invalid');
                newLessons.push({
                    id: Math.floor(Math.random() * 1000) + 10, // Mock ID
                    chapterId: currentChapterId,
                    title: title,
                    videoUrl: row.find('.l-video').val().trim(),
                    orderIndex: parseInt(row.find('.l-order').val()),
                    isFree: row.find('.l-isFree').is(':checked'),
                    isActive: true
                });
            }
        });

        if(!isValid) return toastr.error("Vui lòng nhập đầy đủ tiêu đề!");
        if(newLessons.length === 0) return toastr.warning("Chưa có dòng nào để lưu!");

        // GIẢ LẬP GỬI AJAX
        Swal.fire({ title: 'Đang xử lý...', didOpen: () => Swal.showLoading() });

        setTimeout(() => {
            // Merge dữ liệu mới vào DB giả lập
            lessonsInDb = [...lessonsInDb, ...newLessons];
            
            Swal.close();
            toastr.success(`Đã thêm thành công ${newLessons.length} bài học!`);
            $('#bulkModal').modal('hide');
            this.renderMainTable();
        }, 1000);
    },

    // 5. KÉO THẢ SẮP XẾP THỨ TỰ (TRANG CHÍNH)
    initSortable: function() {
        const el = document.getElementById('mainLessonBody');
        Sortable.create(el, {
            handle: '.drag-handle',
            animation: 150,
            onEnd: () => {
                let sortedIds = [];
                $('#mainLessonBody tr').each(function() { sortedIds.push($(this).data('id')); });
                
                // Cập nhật lại OrderIndex trong DB giả lập
                lessonsInDb.forEach(l => {
                    const idx = sortedIds.indexOf(l.id);
                    if(idx !== -1) l.orderIndex = idx + 1;
                });
                
                console.log("Thứ tự ID mới gửi về Server:", sortedIds);
                toastr.info("Đã cập nhật thứ tự!");
                this.renderMainTable();
            }
        });
    },

    delete: function(id) {
        lessonsInDb = lessonsInDb.filter(l => l.id !== id);
        toastr.error("Đã xóa bài học!");
        this.renderMainTable();
    }
};

$(document).ready(() => LessonManager.init());
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>Quản lý Khóa học & Bài giảng</title>
    <style>
        .card { border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .btn-pill { border-radius: 50px; }
        .bg-cpp { background: #00599C; color: white; }
        .bg-csharp { background: #68217A; color: white; }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <h2 class="fw-bold mb-4 text-center">Hệ Thống Quản Lý Đào Tạo</h2>

    <div class="card">
        <div class="card-header bg-white py-3">
            <h5 class="mb-0 fw-bold"><i class="bi bi-journal-bookmark-fill me-2"></i>Danh sách Khóa học hiện có</h5>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Khóa học</th>
                        <th class="text-center">Số lượng bài</th>
                        <th class="text-end pe-4">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="ps-4">
                            <div class="d-flex align-items-center">
                                <div class="p-2 rounded bg-cpp me-3">C++</div>
                                <span class="fw-bold">Lập trình C++ từ cơ bản đến nâng cao</span>
                            </div>
                        </td>
                        <td class="text-center"><span class="badge bg-primary">2 bài giảng</span></td>
                        <td class="text-end pe-4">
                            <button class="btn btn-dark btn-sm btn-pill px-3" onclick="viewDetail(1, 'C++ cơ bản')">
                                <i class="bi bi-eye me-1"></i> Xem bài giảng
                            </button>
                        </td>
                    </tr>
                    <tr>
                        <td class="ps-4">
                            <div class="d-flex align-items-center">
                                <div class="p-2 rounded bg-csharp me-3">C#</div>
                                <span class="fw-bold">Lập trình ASP.NET Core MVC (C#)</span>
                            </div>
                        </td>
                        <td class="text-center"><span class="badge bg-primary">2 bài giảng</span></td>
                        <td class="text-end pe-4">
                            <button class="btn btn-dark btn-sm btn-pill px-3" onclick="viewDetail(2, 'ASP.NET Core')">
                                <i class="bi bi-eye me-1"></i> Xem bài giảng
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="lessonListModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content shadow-lg border-0" style="border-radius: 20px;">
            <div class="modal-header">
                <h5 class="modal-title fw-bold" id="modalTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr class="text-muted small">
                                <th>STT</th>
                                <th>Tên bài học</th>
                                <th class="text-end">Phát Video</th>
                            </tr>
                        </thead>
                        <tbody id="lessonBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="videoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content bg-dark border-0">
            <div class="modal-header border-0">
                <h6 class="modal-title text-white" id="videoTitle"></h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" onclick="stopVideo()"></button>
            </div>
            <div class="modal-body p-0">
                <div class="ratio ratio-16x9">
                    <iframe id="youtubeIframe" src="" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // DỮ LIỆU FIX CỨNG ĐỂ BÁC HÌNH DUNG
    const rawData = [
        { id: 1, courseId: 1, title: "Bài 1: Cài đặt môi trường Dev C++", videoId: "m_YshL_7uTo", order: 1 },
        { id: 2, courseId: 1, title: "Bài 2: Biến và Kiểu dữ liệu trong C++", videoId: "7wy0vS9p_9c", order: 2 },
        { id: 3, courseId: 2, title: "Bài 1: Giới thiệu về .NET 8.0", videoId: "gFKVpDgWkiU", order: 1 },
        { id: 4, courseId: 2, title: "Bài 2: Cấu trúc Project ASP.NET MVC", videoId: "Z735u_7R7Kw", order: 2 }
    ];

    function viewDetail(courseId, courseName) {
        $('#modalTitle').text("Bài giảng khóa: " + courseName);
        let html = '';
        
        // Lọc dữ liệu theo ID khóa học
        const filtered = rawData.filter(x => x.courseId == courseId);

        filtered.forEach(item => {
            html += `
                <tr>
                    <td>${item.order}</td>
                    <td class="fw-bold">${item.title}</td>
                    <td class="text-end">
                        <button class="btn btn-danger btn-sm rounded-pill px-3" onclick="playVideo('${item.videoId}', '${item.title}')">
                            <i class="bi bi-play-fill"></i> Phát bài học
                        </button>
                    </td>
                </tr>`;
        });

        $('#lessonBody').html(html);
        new bootstrap.Modal(document.getElementById('lessonListModal')).show();
    }

    function playVideo(id, title) {
        $('#videoTitle').text(title);
        // Chuyển sang link nhúng embed
        $('#youtubeIframe').attr('src', 'https://www.youtube.com/embed/' + id + '?autoplay=1');
        new bootstrap.Modal(document.getElementById('videoModal')).show();
    }

    function stopVideo() {
        $('#youtubeIframe').attr('src', '');
    }
</script>

</body>
</html>
